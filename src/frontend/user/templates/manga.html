<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/images/icon.ico" type="image/x-icon">
  <title>Загрузка манги</title>
  <script>
      window.__API__ = {{ API|safe }};
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/manga.css">
  <script src="/static/js/base.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="/">
        <h1>Manga-Day</h1>
      </a>
    </div>

    <form id="search-form" class="search-form" action="/query" method="GET" role="search" novalidate>
      <label class="sr-only" for="search-input">Поиск манги</label>
      <input
        type="search"
        id="search-input"
        name="query"
        placeholder="Название или SKU"
        autocomplete="off"
        spellcheck="false"
      />
      <button type="submit" aria-label="Искать">
        <span>Поиск</span>
      </button>
      <div class="error-message" id="search-error" aria-live="polite" style="display: none;"></div>
    </form>

    <button type="button" id="random">
      <span>Удиви меня!</span>
    </button>
  </header>

  <div class="manga-gallery" id="manga">
      <div class="gallery-state">Загрузка манги...</div>
  </div>

  <div class="text-wrap">
    <h1 id="textShow">Новинки</h1>
  </div>

  <main class="page">
    <section class="manga-gallery" id="gallery" aria-live="polite">
      <div class="gallery-state">Загрузка манги...</div>
    </section>

    <div id="loader" class="loader" aria-hidden="true">
      <span>Загрузка ещё...</span>
    </div>
  </main>

  <footer class="footer">
    © 2026 Manga-Day
  </footer>

  <script src="/static/js/random.js"></script>
  <script src="/static/js/unified-manga.js"></script>
</body>
</html>
